<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gallery | New Sandarshini</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}
body{
  background:#0f0f0f;
  color:#fff;
}

/* ===== NAVBAR ===== */
.navbar{
  position:fixed;
  top:0;
  width:100%;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(0,0,0,0.9);
  z-index:1000;
}
.logo{
  color:#c1121f;
  font-size:26px;
  font-weight:700;
}
.nav-links{
  display:flex;
}
.nav-links a{
  color:#fff;
  margin-left:25px;
  text-decoration:none;
}
.nav-links a:hover{
  color:#c1121f;
}
.toggle{
  display:none;
  font-size:26px;
  cursor:pointer;
}

/* ===== GALLERY ===== */
.gallery{
  padding:120px 30px 80px;
  text-align:center;
}
.gallery h1{
  color:#c1121f;
  font-size:40px;
  margin-bottom:15px;
}
.gallery p{
  opacity:.85;
  margin-bottom:40px;
}

.gallery-grid{
  max-width:1200px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.gallery-item{
  overflow:hidden;
  border-radius:15px;
  position:relative;
}
.gallery-item img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:.4s;
}
.gallery-item:hover img{
  transform:scale(1.1);
}

/* overlay */
.gallery-item::after{
  content:"Sandarshini";
  position:absolute;
  inset:0;
  background:rgba(193,18,31,0.25);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:600;
  opacity:0;
  transition:.4s;
}
.gallery-item:hover::after{
  opacity:1;
}

/* ===== FOOTER ===== */
footer{
  background:#000;
  padding:15px;
  text-align:center;
  font-size:14px;
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .toggle{
    display:block;
  }
  .nav-links{
    position:absolute;
    top:65px;
    right:0;
    width:100%;
    background:#000;
    flex-direction:column;
    display:none;
  }
  .nav-links a{
    padding:15px;
    border-top:1px solid #222;
    margin:0;
  }
  .nav-links.show{
    display:flex;
  }
}
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:65px;
  background:#000;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid #222;
  z-index:9999;
}

.bottom-nav a{
  color:#aaa;
  text-decoration:none;
  font-size:11px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.bottom-nav i{
  font-size:20px;
  margin-bottom:4px;
}

.bottom-nav a.active,
.bottom-nav a:hover{
  color:#c1121f;
}

/* Desktop lo hide cheyyali ante */
@media(min-width:900px){
  .bottom-nav{
    display:none;
  }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo">NEW SANDARSHINI</div>

  <div class="toggle" onclick="toggleMenu()">
    <i class="fas fa-bars"></i>
  </div>

  <nav class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="menu.html">Menu</a>
    <a href="about.html">About</a>
    <a href="image.html">Gallery</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<!-- GALLERY SECTION -->
<section class="gallery">
  <h1>Our Gallery</h1>
  <p>Moments, flavors & ambience at Sandarshini</p>

  <div class="gallery-grid">
    <div class="gallery-item">
      <img src="4.jpg">
    </div>
    <div class="gallery-item">
      <img src="6.jpg">
    </div>
    <div class="gallery-item">
      <img src="7.jpg">
    </div>
    <div class="gallery-item">
      <img src="https://images.unsplash.com/photo-1551218808-94e220e084d2">
    </div>
    <div class="gallery-item">
      <img src="3.jpg">
    </div>
    <div class="gallery-item">
      <img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe">
    </div>
  </div>
</section>
<nav class="bottom-nav">
  <a href="index.html" class="active">
    <i class="fas fa-home"></i>
    <span>Home</span>
  </a>

  <a href="about.html">
    <i class="fas fa-info-circle"></i>
    <span>About</span>
  </a>

  <a href="menu.html">
    <i class="fas fa-utensils"></i>
    <span>Menu</span>
  </a>

  <a href="game.html">
    <i class="fas fa-gamepad"></i>
    <span>Game</span>
  </a>

  <a href="contact.html">
    <i class="fas fa-phone"></i>
    <span>Contact</span>
  </a>
</nav>
<footer>
  © 2025 New Sandarshini Restaurant | All Rights Reserved
</footer>

<script>
function toggleMenu(){
  document.getElementById("navLinks").classList.toggle("show");
}
</script>

</body>
</html>
